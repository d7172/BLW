openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contacts
    description: Contact inquiry operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contacts:
    post:
      operationId: createContact
      tags: [contacts]
      summary: Submit a contact inquiry
      description: Stores a contact/quote request submitted from the website
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Contact:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - phone
        - serviceRequired
        - message
        - createdAt
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: ["string", "null"]
        email:
          type: string
        phone:
          type: string
        serviceRequired:
          type: string
        message:
          type: string
        createdAt:
          type: string
    ContactInput:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phone
        - serviceRequired
        - message
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        company:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 10
          maxLength: 15
        serviceRequired:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 20
          maxLength: 1000
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
